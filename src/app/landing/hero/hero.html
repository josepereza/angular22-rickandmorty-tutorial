<section class="hero">
  <div class="hero-bg">
    <div class="hero-bg-shape hero-bg-shape--1"></div>
    <div class="hero-bg-shape hero-bg-shape--2"></div>
    <div class="hero-bg-shape hero-bg-shape--3"></div>
  </div>

  <div class="container hero-container">
    <div class="row align-items-center g-5">
      <div class="col-12 col-lg-6 text-center text-lg-start">
        <span class="hero-badge">🚀 Transformación digital</span>

        <h1 class="hero-title" #title>
          Haz crecer tu negocio con una web que trabaja por ti.
        </h1>

        <p class="hero-subtitle" #subtitle>
          Atrae más clientes desde el primer día con una plataforma moderna, rápida y completamente automatizada.
        </p>

        <div class="hero-actions" #cta>
          <button class="btn btn-primary btn-lg hero-cta">
            Empezar ahora
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="ms-2">
              <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="btn btn-outline-secondary btn-lg hero-cta-secondary">
            Saber más
          </button>
        </div>
      </div>

      <div class="col-12 col-lg-6 text-center">
        <div class="hero-image-wrapper">
          <img src="laptop.svg" alt="Laptop futurista" class="hero-image" #image>
        </div>
      </div>
    </div>
  </div>
</section>
